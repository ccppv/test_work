services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dashboard}
      POSTGRES_USER: ${POSTGRES_USER:-dashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dashboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: >-
        postgresql+asyncpg://${POSTGRES_USER:-dashboard}:${POSTGRES_PASSWORD:-dashboard}@postgres:5432/${POSTGRES_DB:-dashboard}
      CORS_ORIGINS: '["http://localhost:3001"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    # Применить миграции → загрузить данные → запустить сервер
    command: >
      sh -c "
        alembic upgrade head &&
        python -m scripts.seed &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    env_file:
      - .env.docker
    environment:
      # Сервер-сайд Next.js проксирует в backend
      BACKEND_URL: http://backend:8000
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
